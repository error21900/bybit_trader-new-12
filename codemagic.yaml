workflows:
  android-release:
    name: Bybit Bot Android Release
    environment:
      flutter: stable
    scripts:
      - name: Initialize Android Project Files
        script: |
          flutter create --platforms=android .
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/**/*.apk
